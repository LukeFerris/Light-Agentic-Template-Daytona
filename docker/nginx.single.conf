server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API endpoints to the backend running inside this same container.
    # Add a matching location here whenever a new backend route is introduced.
    location = /hello {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }
    location = /storage {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }
    location = /health {
        proxy_pass http://127.0.0.1:3000;
    }

    # Single-page app: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
